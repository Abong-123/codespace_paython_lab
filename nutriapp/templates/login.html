<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk — NutriApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/login.css">

</head>
<body class="bg-mesh min-h-screen flex items-center justify-center px-4 py-12">

  <!-- Grid decoration -->

  <div class="w-full max-w-md relative z-10">

    <!-- Logo -->
    <div class="animate-fadeUp text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </div>
        <span class="mono text-emerald-400 font-medium tracking-widest text-sm uppercase">NutriApp</span>
      </div>
      <h1 class="text-3xl font-bold text-green">Selamat Datang</h1>
      <p class="text-slate-400 text-sm mt-1">Masuk untuk melanjutkan</p>
    </div>

    <!-- Card -->
    <div class="card rounded-2xl p-8 animate-fadeUp delay-1">

      {% if error %}
      <div class="mb-5 flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm animate-fadeUp">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">

        <div class="animate-fadeUp delay-2">
          <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wider">Email</label>
          <input
            type="email" name="email" required
            placeholder="email@contoh.com"
            class="input-field w-full rounded-xl px-4 py-3 text-sm"
          />
        </div>

        <div class="animate-fadeUp delay-3">
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Password</label>
            <a href="#" class="text-xs text-emerald-400 hover:text-emerald-300 transition-colors">Lupa password?</a>
          </div>
          <div class="relative">
            <input
              type="password" name="password" id="password" required
              placeholder="Masukkan password"
              class="input-field w-full rounded-xl px-4 py-3 pr-11 text-sm"
            />
            <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me -->
        <div class="flex items-center gap-2 animate-fadeUp delay-3">
          <input type="checkbox" id="remember" name="remember" class="w-4 h-4 rounded accent-emerald-500"/>
          <label for="remember" class="text-sm text-slate-400 cursor-pointer">Ingat saya</label>
        </div>

        <div class="animate-fadeUp delay-4 pt-1">
          <button type="submit" class="btn-primary w-full text-white font-semibold py-3 rounded-xl text-sm">
            Masuk
          </button>
        </div>

      </form>

      <p class="text-center text-slate-500 text-sm mt-6 animate-fadeUp delay-4">
        Belum punya akun?
        <a href="/register" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">Daftar</a>
      </p>
    </div>

    <p class="mono text-center text-slate-600 text-xs mt-6 animate-fadeUp delay-4">v1.0 · NutriApp © 2025</p>
  </div>

  <script>
    function togglePass() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
