<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil - NutriApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/edit_profile.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="/dashboard" class="logo">
                    <div class="logo-icon">🍏</div>
                    <span class="logo-text">NutriApp</span>
                </a>
            </div>

            <div class="nav-right">
                <a href="/logout" class="btn-logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">

            <!-- Header -->
            <div class="page-header">
                <h1 class="page-title">Edit Profil</h1>
                <p class="page-subtitle">Lengkapi informasi akunmu</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="alert alert-error">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <!-- Success Message -->
            {% if success %}
            <div class="alert alert-success">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 13l4 4L19 7"/>
                </svg>
                Profil berhasil diperbarui!
            </div>
            {% endif %}

            <form method="post" action="/edit_profile" enctype="multipart/form-data">

                <!-- Photo Profile Section -->
                <div class="form-card">
                    <div class="form-card-header">
                        <h2>Foto Profil</h2>
                    </div>
                    <div class="form-card-content">
                        <div class="photo-upload">
                            <div class="photo-preview" onclick="document.getElementById('photo').click()">
                                <img
                                    id="avatar-preview"
                                    src="{{ user.photo if user.photo else 'https://ui-avatars.com/api/?name=' + user.nama + '&background=10b981&color=fff&size=128' }}"
                                    alt="Foto Profil"
                                />
                                <div class="photo-overlay">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                        <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="photo-info">
                                <button
                                    type="button"
                                    onclick="document.getElementById('photo').click()"
                                    class="photo-btn"
                                >
                                    Ganti Foto
                                </button>
                                <p class="photo-hint">JPG, PNG. Maks 2MB</p>
                                <input
                                    type="file"
                                    id="photo"
                                    name="photo"
                                    accept="image/*"
                                    class="hidden"
                                    onchange="previewAvatar(event)"
                                />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Account Information -->
                <div class="form-card">
                    <div class="form-card-header">
                        <h2>Informasi Akun</h2>
                    </div>
                    <div class="form-card-content">
                        <div class="form-group">
                            <label class="form-label">Nama Lengkap</label>
                            <input
                                type="text"
                                name="nama"
                                required
                                value="{{ user.nama }}"
                                placeholder="Masukkan nama lengkap"
                                class="form-input"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                value="{{ user.email }}"
                                disabled
                                class="form-input form-input-disabled"
                            />
                            <p class="form-hint">Email tidak dapat diubah</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Alamat</label>
                            <input
                                type="text"
                                name="alamat"
                                value="{{ user.alamat if user.alamat else '' }}"
                                placeholder="Masukkan alamat kamu"
                                class="form-input"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label">Bio</label>
                            <textarea
                                name="bio"
                                rows="4"
                                placeholder="Ceritakan sedikit tentang dirimu..."
                                class="form-input form-textarea"
                            >{{ user.bio if user.bio else '' }}</textarea>
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Simpan Perubahan
                    </button>
                    <a href="/profile" class="btn-back">
                        ← Kembali ke Profil
                    </a>
                </div>

            </form>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">v1.0 · NutriApp © 2025</p>
        </div>
    </footer>

    <script>
        function previewAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('avatar-preview');
                preview.src = reader.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>
</html>
